name: Benchmark

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'scripts/callgrind-bench.sh'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'scripts/callgrind-bench.sh'
      - '.github/workflows/benchmark.yml'

permissions: {}

jobs:
  callgrind:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config \
            libzip-dev zlib1g-dev \
            libgtest-dev valgrind

      - name: Build (Release for realistic perf numbers)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Run callgrind benchmarks
        run: scripts/callgrind-bench.sh build/zipwrapper_tests benchmark-results.json

      - name: Store and compare benchmark results
        uses: benchmark-action/github-action-benchmark@fd31771ce86cc65eab85653da103f71ab1b4479c # v1.9.0
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # On push to main: store results on gh-pages
          auto-push: ${{ github.event_name == 'push' }}
          # On PRs: post a comparison comment
          comment-on-alert: true
          # Alert if instructions increase by more than 10%
          alert-threshold: "110%"
          # Only warn, don't fail the build on regression
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
